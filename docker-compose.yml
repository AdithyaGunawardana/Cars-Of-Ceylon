services:
  db:
    image: postgres:16-alpine
    container_name: coc_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cars_of_ceylon
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cars_of_ceylon"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: coc_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: coc_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/cars-of-ceylon;
      mc anonymous set download local/cars-of-ceylon;
      exit 0;
      "
    restart: "no"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: coc_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cars_of_ceylon?schema=public
      AUTH_SECRET: replace-with-a-long-random-string
      AUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      AUTH_APPLE_ID: ""
      AUTH_APPLE_SECRET: ""
      UPLOAD_S3_ENDPOINT: http://minio:9000
      UPLOAD_S3_REGION: us-east-1
      UPLOAD_S3_BUCKET: cars-of-ceylon
      UPLOAD_S3_ACCESS_KEY_ID: minioadmin
      UPLOAD_S3_SECRET_ACCESS_KEY: minioadmin
      UPLOAD_S3_PUBLIC_BASE_URL: http://localhost:9000/cars-of-ceylon
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  pg_data:
  minio_data:
